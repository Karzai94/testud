name: Build Test App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK 35
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;35.0.0"
      - name: Install Flutter 3.24.5
        run: |
          git clone https://github.com/flutter/flutter.git \
            --depth 1 -b 3.24.5 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter 3.24.5
        run: |
          git clone https://github.com/flutter/flutter.git \
            --depth 1 -b 3.24.5 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
      - run: flutter precache --ios
      - run: flutter pub get
      - run: cd ios && pod install --repo-update && cd ..
      - run: flutter build ios --release --no-codesign
      - name: Fix frameworks and create IPA
        run: |
          APP="build/ios/iphoneos/Runner.app"
          for fw in "$APP/Frameworks"/*.framework; do
            name=$(basename "$fw" .framework)
            plist="$fw/Info.plist"
            if [ -f "$plist" ]; then
              /usr/libexec/PlistBuddy -c "Print CFBundleExecutable" "$plist" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Add CFBundleExecutable string $name" "$plist"
              /usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$plist" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Add CFBundleIdentifier string dj.univ.testud.$name" "$plist"
            fi
            codesign --force --sign - --timestamp=none "$fw" 2>/dev/null || true
          done
          codesign --force --sign - --timestamp=none "$APP" 2>/dev/null || true
          cd build/ios/iphoneos
          rm -rf Payload && mkdir Payload
          cp -r Runner.app Payload/
          zip -qr TestUD.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: TestUD-ipa
          path: build/ios/iphoneos/TestUD.ipa
