workflows:
  ios-simulator:
    name: iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: cd ios && pod install --repo-update && cd ..

      - name: Build iOS Simulator
        script: flutter build ios --simulator --debug

      - name: Create ZIP for appetize
        script: |
          cd build/ios/iphonesimulator
          zip -qr TestUD_simulator.zip Runner.app
          echo "ZIP: $(du -sh TestUD_simulator.zip)"

    artifacts:
      - build/ios/iphonesimulator/TestUD_simulator.zip